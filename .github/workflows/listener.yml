name: Listener (run-tests)

on:
  repository_dispatch:
    types: [run-tests]

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-latest
    steps:
      # Log trigger context (triggered by repository_dispatch from another entity). Revert: remove this step only.
      - name: Log trigger context
        run: |
          echo "::group::Trigger context"
          echo "event_name: ${{ github.event_name }}"
          echo "event_action: ${{ github.event.action }}"
          echo "actor: ${{ github.actor }}"
          echo "repository: ${{ github.repository }}"
          echo "run_id: ${{ github.run_id }}"
          echo "ref: ${{ github.ref }}"
          echo "sha: ${{ github.sha }}"
          echo "client_payload: ${{ toJSON(github.event.client_payload) }}"
          echo "::endgroup::"
      - uses: actions/checkout@v4

      - name: Create venv and install dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: Run tests
        run: |
          mkdir -p reports
          .venv/bin/pytest -v --tb=short --html=reports/report.html --self-contained-html
