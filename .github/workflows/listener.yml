name: Listener (run-tests)

on:
  repository_dispatch:
    types: [run-tests]

permissions:
  contents: read

jobs:
  test:
    runs-on: self-hosted
    steps:
      # Log trigger context (triggered by repository_dispatch from another entity). Revert: remove this step only.
      - name: Log trigger context
        run: |
          echo "::group::Trigger context"
          echo "event_name: ${{ github.event_name }}"
          echo "event_action: ${{ github.event.action }}"
          echo "actor: ${{ github.actor }}"
          echo "repository: ${{ github.repository }}"
          echo "run_id: ${{ github.run_id }}"
          echo "ref: ${{ github.ref }}"
          echo "sha: ${{ github.sha }}"
          echo "client_payload: ${{ toJSON(github.event.client_payload) }}"
          echo "::endgroup::"
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          RP_API_KEY: ${{ secrets.RP_API_KEY }}
          RP_ENDPOINT: http://localhost:8080
        run: |
          mkdir -p reports
          if [ -n "$RP_API_KEY" ]; then
            echo "::notice::Report Portal: enabled (RP_API_KEY set)"
            pytest -v --tb=short --html=reports/report.html --self-contained-html --reportportal
          else
            echo "::notice::Report Portal: skipped (no RP_API_KEY secret)"
            pytest -v --tb=short --html=reports/report.html --self-contained-html
          fi

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-html-report
          path: reports/report.html
