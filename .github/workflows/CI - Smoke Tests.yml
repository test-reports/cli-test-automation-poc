name: CI - Smoke Tests & Report

on:
  push:
    branches: [poc-cli-tests]
  # Any PR (any target branch) triggers CI
  pull_request: {}

permissions:
  contents: write

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log trigger context
        run: |
          echo "::group::Trigger context (CI - Smoke Tests)"
          echo "event_name: ${{ github.event_name }}"
          echo "actor: ${{ github.actor }}"
          echo "repository: ${{ github.repository }}"
          echo "ref: ${{ github.ref }}"
          echo "sha: ${{ github.sha }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "pr_number: ${{ github.event.pull_request.number }}"
            echo "pr_title: ${{ github.event.pull_request.title }}"
          fi
          echo "::endgroup::"

      - name: Create venv and install dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: Run smoke tests
        run: |
          mkdir -p reports
          .venv/bin/pytest -v --tb=short -m smoke --junitxml=reports/junit.xml

      - name: Generate CLI HTML dashboard
        if: always()
        run: |
          .venv/bin/python -m utils.cli_dashboard \
            --junit-path reports/junit.xml \
            --output-dir dashboard

      - name: Push dashboard to test-dashboard branch (smoke)
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DASHBOARD_BRANCH: test-dashboard
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin --prune

          WORKTREE_DIR="$(mktemp -d)"
          if git show-ref --verify --quiet "refs/remotes/origin/${DASHBOARD_BRANCH}"; then
            git worktree add -B "${DASHBOARD_BRANCH}" "${WORKTREE_DIR}" "origin/${DASHBOARD_BRANCH}"
          else
            git worktree add -B "${DASHBOARD_BRANCH}" "${WORKTREE_DIR}"
          fi

          mkdir -p "${WORKTREE_DIR}/smoke"
          rsync -a --delete dashboard/ "${WORKTREE_DIR}/smoke/"

          cp pages-landing/index.html "${WORKTREE_DIR}/index.html"

          cd "${WORKTREE_DIR}"
          git add .
          if git diff --cached --quiet; then
            echo "No dashboard changes to commit."
          else
            git commit -m "Update CLI dashboard (smoke) for run ${GITHUB_RUN_ID}"
            git push origin "${DASHBOARD_BRANCH}"
          fi

      - name: Write CLI test dashboard summary
        if: always()
        run: |
          python - << 'PY'
          import os
          from pathlib import Path
          from utils.cli_dashboard import summarize_junit

          junit = Path("reports/junit.xml")
          if not junit.is_file():
              raise SystemExit("reports/junit.xml not found; cannot build dashboard summary.")

          counts = summarize_junit(junit)

          passed = counts.get("passed", 0)
          failed = counts.get("failed", 0)
          error = counts.get("error", 0)
          skipped = counts.get("skipped", 0)
          total = counts.get("total", 0)
          raw_total = counts.get("raw_total", total)
          summary_total = counts.get("summary_total", total)
          # GitHub Pages dashboard URL for this repo (project site)
          owner = os.environ.get("GITHUB_REPOSITORY_OWNER") or (os.environ.get("GITHUB_REPOSITORY", "").split("/")[0] if os.environ.get("GITHUB_REPOSITORY") else "")
          pages_url = f"https://{owner}.github.io/cli-test-automation-poc/" if owner else ""

          lines = []
          lines.append("### CLI test dashboard summary (smoke)")
          lines.append("")
          lines.append(f"- **Total tests**: {total}")
          lines.append(f"- **Passed**: {passed}")
          lines.append(f"- **Failed**: {failed}")
          lines.append(f"- **Error**: {error}")
          lines.append(f"- **Skipped**: {skipped}")
          if pages_url:
              lines.append("")
              lines.append(f"- **Smoke dashboard**: {pages_url}smoke/")
              lines.append(f"- **All dashboards**: {pages_url}")
          lines.append("")
          lines.append("_Smoke tests only. Rendered from `reports/junit.xml`. Generate locally with `pytest -m smoke --junitxml=reports/junit.xml` and `python -m utils.cli_dashboard --junit-path reports/junit.xml --output-dir dashboard`._")

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as fh:
                  fh.write("\n".join(lines) + "\n")
          PY
