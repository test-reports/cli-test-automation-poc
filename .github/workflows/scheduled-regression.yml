# Scheduled regression run. Runs on the default branch only (GitHub Actions constraint).
# 22:17 UTC = 3:17 PM PDT (2:17 PM PST in winter).
name: Scheduled regression

on:
  schedule:
    # 22:17 UTC = 3:17 PM PDT
    - cron: '17 22 * * *'

permissions:
  contents: write

jobs:
  regression:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create venv and install dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: Run regression tests
        run: |
          mkdir -p reports
          .venv/bin/pytest -v --tb=short -m regression --junitxml=reports/junit.xml

      - name: Generate CLI HTML dashboard
        if: always()
        run: |
          .venv/bin/python -m utils.cli_dashboard \
            --junit-path reports/junit.xml \
            --output-dir dashboard

      - name: Push dashboard to test-dashboard branch
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DASHBOARD_BRANCH: test-dashboard
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin --prune

          WORKTREE_DIR="$(mktemp -d)"
          if git show-ref --verify --quiet "refs/remotes/origin/${DASHBOARD_BRANCH}"; then
            git worktree add -B "${DASHBOARD_BRANCH}" "${WORKTREE_DIR}" "origin/${DASHBOARD_BRANCH}"
          else
            git worktree add -B "${DASHBOARD_BRANCH}" "${WORKTREE_DIR}"
          fi

          # Each suite gets its own folder under the worktree (e.g. smoke/, regression/)
          SUITE_NAME="regression"

          # Timestamped run folder for history plus a "latest" pointer for convenience
          RUN_ID="${GITHUB_RUN_ID:-$(date +%Y%m%d-%H%M%S)}"
          RUN_DIR="${WORKTREE_DIR}/${SUITE_NAME}/${RUN_ID}"
          LATEST_DIR="${WORKTREE_DIR}/${SUITE_NAME}/latest"

          mkdir -p "${RUN_DIR}" "${LATEST_DIR}"

          echo "Syncing dashboard to suite run directory: ${RUN_DIR}"
          # Keep each run's snapshot; delete only within this run's folder
          rsync -a --delete --exclude='.git' dashboard/ "${RUN_DIR}/"

          echo "Updating suite latest pointer: ${LATEST_DIR}"
          # Latest always reflects the most recent run, without touching other suites
          rsync -a --delete --exclude='.git' dashboard/ "${LATEST_DIR}/"

          cd "${WORKTREE_DIR}"
          git add .
          if git diff --cached --quiet; then
            echo "No dashboard changes to commit."
          else
            git commit -m "Update CLI dashboard (scheduled regression) run ${GITHUB_RUN_ID}"
            git push origin "${DASHBOARD_BRANCH}"
          fi

      - name: Write CLI test dashboard summary
        if: always()
        run: |
          python - << 'PY'
          import os
          from pathlib import Path
          from utils.cli_dashboard import summarize_junit

          junit = Path("reports/junit.xml")
          if not junit.is_file():
              raise SystemExit("reports/junit.xml not found; cannot build dashboard summary.")

          counts = summarize_junit(junit)

          passed = counts.get("passed", 0)
          failed = counts.get("failed", 0)
          error = counts.get("error", 0)
          skipped = counts.get("skipped", 0)
          total = counts.get("total", 0)
          owner = os.environ.get("GITHUB_REPOSITORY_OWNER") or (os.environ.get("GITHUB_REPOSITORY", "").split("/")[0] if os.environ.get("GITHUB_REPOSITORY") else "")
          pages_url = f"https://{owner}.github.io/cli-test-automation-poc/" if owner else ""
          regression_latest_url = f"{pages_url}regression/latest/" if pages_url else ""

          lines = []
          lines.append("### CLI test dashboard summary (scheduled regression)")
          lines.append("")
          lines.append(f"- **Total tests**: {total}")
          lines.append(f"- **Passed**: {passed}")
          lines.append(f"- **Failed**: {failed}")
          lines.append(f"- **Error**: {error}")
          lines.append(f"- **Skipped**: {skipped}")
          if regression_latest_url:
              lines.append("")
              lines.append(f"- **Regression dashboard (latest)**: {regression_latest_url}")
              lines.append(f"- **All dashboards (branch root)**: {pages_url}")
          lines.append("")
          lines.append("_Scheduled run (regression only). Rendered from `reports/junit.xml`. Dashboard published to the `test-dashboard` branch under `regression/<run-id>/` with `regression/latest/` as a stable pointer._")

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as fh:
                  fh.write("\n".join(lines) + "\n")
          PY
