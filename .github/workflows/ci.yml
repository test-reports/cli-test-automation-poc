name: Test and report

on:
  push:
    branches: [poc-cli-tests]
  pull_request:
    branches: [poc-cli-tests]

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create venv and install dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: Run tests
        run: |
          mkdir -p reports
          .venv/bin/pytest -v --tb=short --html=reports/report.html --self-contained-html
