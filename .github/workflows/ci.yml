name: Test and report

on:
  push:
    branches: [poc-cli-tests]
  pull_request:
    branches: [poc-cli-tests]

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          RP_API_KEY: ${{ secrets.RP_API_KEY }}
        run: |
          mkdir -p reports
          if [ -n "$RP_API_KEY" ]; then
            echo "::notice::Report Portal: enabled (RP_API_KEY set)"
            pytest -v --tb=short --html=reports/report.html --self-contained-html --reportportal
          else
            echo "::notice::Report Portal: skipped (no RP_API_KEY secret)"
            pytest -v --tb=short --html=reports/report.html --self-contained-html
          fi

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-html-report
          path: reports/report.html
