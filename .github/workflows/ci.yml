name: Test and report

on:
  push:
    branches: [poc-cli-tests]
  pull_request:
    branches: [poc-cli-tests]

permissions:
  contents: write

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create venv and install dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: Run tests
        run: |
          mkdir -p reports
          .venv/bin/pytest -v --tb=short --junitxml=reports/junit.xml

      - name: Generate CLI HTML dashboard
        run: |
          .venv/bin/python -m utils.cli_dashboard \
            --junit-path reports/junit.xml \
            --output-dir dashboard

      - name: Push dashboard to test-dashboard branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DASHBOARD_BRANCH: test-dashboard
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Ensure full history so we can create/update the dashboard branch
          git fetch origin --prune

          # Create a worktree for the dashboard branch
          WORKTREE_DIR="$(mktemp -d)"
          if git show-ref --verify --quiet "refs/remotes/origin/${DASHBOARD_BRANCH}"; then
            # Create/update a local branch tracking origin/DASHBOARD_BRANCH and add worktree on that branch
            git worktree add -B "${DASHBOARD_BRANCH}" "${WORKTREE_DIR}" "origin/${DASHBOARD_BRANCH}"
          else
            # Create a new local branch from current HEAD
            git worktree add -B "${DASHBOARD_BRANCH}" "${WORKTREE_DIR}"
          fi

          # Sync generated dashboard into the worktree (preserve .git)
          rsync -a --delete --exclude='.git' dashboard/ "${WORKTREE_DIR}/"

          cd "${WORKTREE_DIR}"
          git add .
          if git diff --cached --quiet; then
            echo "No dashboard changes to commit."
          else
            git commit -m "Update CLI dashboard for run ${GITHUB_RUN_ID}"
            git push origin "${DASHBOARD_BRANCH}"
          fi

      - name: Write CLI test dashboard summary
        run: |
          python - << 'PY'
          import os
          from pathlib import Path
          from utils.cli_dashboard import summarize_junit

          junit = Path("reports/junit.xml")
          if not junit.is_file():
              raise SystemExit("reports/junit.xml not found; cannot build dashboard summary.")

          counts = summarize_junit(junit)

          passed = counts.get("passed", 0)
          failed = counts.get("failed", 0)
          error = counts.get("error", 0)
          skipped = counts.get("skipped", 0)
          total = counts.get("total", 0)
          raw_total = counts.get("raw_total", total)
          summary_total = counts.get("summary_total", total)
          # GitHub Pages dashboard URL for this repo (project site)
          owner = os.environ.get("GITHUB_REPOSITORY_OWNER") or (os.environ.get("GITHUB_REPOSITORY", "").split("/")[0] if os.environ.get("GITHUB_REPOSITORY") else "")
          pages_url = f"https://{owner}.github.io/cli-test-automation-poc/" if owner else ""

          lines = []
          lines.append("### CLI test dashboard summary")
          lines.append("")
          lines.append(f"- **Total tests**: {total}")
          lines.append(f"- **Passed**: {passed}")
          lines.append(f"- **Failed**: {failed}")
          lines.append(f"- **Error**: {error}")
          lines.append(f"- **Skipped**: {skipped}")
          if pages_url:
              lines.append("")
              lines.append(f"- **GitHub Pages dashboard**: {pages_url}")
          lines.append("")
          lines.append("_Rendered from `reports/junit.xml`. Generate locally with `pytest --junitxml=reports/junit.xml` and `python -m utils.cli_dashboard --junit-path reports/junit.xml --output-dir dashboard`._")

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as fh:
                  fh.write("\n".join(lines) + "\n")
          PY
