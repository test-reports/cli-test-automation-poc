# Reusable workflow: run tests. Called from poc-app-repo so the run appears in app repo Actions.
name: Run tests (reusable)

on:
  workflow_call:
    inputs:
      source_repo:
        required: true
        type: string
      source_event:
        required: true
        type: string
      ref:
        required: true
        type: string
      sha:
        required: true
        type: string
      pr_number:
        required: false
        type: string
        default: ""
      sender:
        required: false
        type: string
        default: ""
      # Repository to checkout (where test code lives). Caller can override.
      repository:
        required: false
        type: string
        default: "test-reports/cli-test-automation-poc"
    secrets:
      # Token with read access to the repository above (for checkout). Required if repo is private.
      repo_access_token:
        required: false

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-latest
    steps:
      - name: Log trigger context
        run: |
          echo "::group::Trigger context (from app repo)"
          echo "source_repo: ${{ inputs.source_repo }}"
          echo "source_event: ${{ inputs.source_event }}"
          echo "ref: ${{ inputs.ref }}"
          echo "sha: ${{ inputs.sha }}"
          echo "pr_number: ${{ inputs.pr_number }}"
          echo "sender: ${{ inputs.sender }}"
          echo "::endgroup::"

      - name: Checkout test repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: main
          token: ${{ secrets.repo_access_token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: |
          mkdir -p reports
          pytest -v --tb=short --html=reports/report.html --self-contained-html

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-html-report
          path: reports/report.html
