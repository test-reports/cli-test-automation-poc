# Reusable workflow: run tests. Called from poc-app-repo so the run appears in app repo Actions.
name: Run tests (reusable)

on:
  workflow_call:
    inputs:
      source_repo:
        required: true
        type: string
      source_event:
        required: true
        type: string
      ref:
        required: true
        type: string
      sha:
        required: true
        type: string
      pr_number:
        required: false
        type: string
        default: ""
      sender:
        required: false
        type: string
        default: ""
      # Repository to checkout (where test code lives). Caller can override.
      repository:
        required: false
        type: string
        default: "test-reports/cli-test-automation-poc"
      # Report Portal endpoint (used when rp_api_key secret is passed). Override if RP is not localhost.
      rp_endpoint:
        required: false
        type: string
        default: "http://localhost:8080"
    secrets:
      # Token with read access to the repository above (for checkout). Required if repo is private.
      repo_access_token:
        required: false
      # Report Portal API key from caller (e.g. poc-app-repo secret RP_API_KEY). When set, pytest runs with --reportportal.
      rp_api_key:
        required: false

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-latest
    steps:
      - name: Log trigger context
        run: |
          echo "::group::Trigger context (from app repo)"
          echo "source_repo: ${{ inputs.source_repo }}"
          echo "source_event: ${{ inputs.source_event }}"
          echo "ref: ${{ inputs.ref }}"
          echo "sha: ${{ inputs.sha }}"
          echo "pr_number: ${{ inputs.pr_number }}"
          echo "sender: ${{ inputs.sender }}"
          echo "::endgroup::"

      - name: Checkout test repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: main
          token: ${{ secrets.repo_access_token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create venv and install dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: Run tests
        env:
          RP_API_KEY: ${{ secrets.rp_api_key }}
          RP_ENDPOINT: ${{ inputs.rp_endpoint }}
        run: |
          mkdir -p reports
          if [ -n "$RP_API_KEY" ]; then
            echo "::notice::Report Portal: enabled (RP_API_KEY from caller)"
            .venv/bin/pytest -v --tb=short --html=reports/report.html --self-contained-html --reportportal
          else
            echo "::notice::Report Portal: skipped (no rp_api_key secret passed)"
            .venv/bin/pytest -v --tb=short --html=reports/report.html --self-contained-html
          fi

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-html-report
          path: reports/report.html
