[pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py
python_functions = test_*
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning

# ReportPortal (optional: use --reportportal to enable). API key from env RP_API_KEY (GitHub secret in CI, config/local.env locally).
rp_endpoint = http://localhost:8080
rp_project = superadmin_personal
rp_launch = CLI_Test_Launch
