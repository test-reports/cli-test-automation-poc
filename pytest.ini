[pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py
python_functions = test_*
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning

# ReportPortal (optional: use --reportportal to enable; set RP_API_KEY in env) - same as test-automation
rp_endpoint = https://btnreport.com
rp_project = superadmin_personal
rp_launch = Test Launch
