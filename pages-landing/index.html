<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CLI Test Dashboards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              background: '#0f1114',
              surface: '#151820',
              border: '#1f2430',
              success: '#22c55e',
              failed: '#fb7185',
              warning: '#eab308',
              info: '#38bdf8'
            }
          }
        }
      };
    </script>
    <style>
      body {
        background: #0f1114;
        color: #e6e8eb;
      }
    </style>
  </head>
  <body class="min-h-screen font-sans">
    <div class="max-w-4xl mx-auto px-4 py-12">
      <header class="mb-10 text-center">
        <h1 class="text-2xl font-semibold tracking-tight text-slate-100">CLI Test Dashboards</h1>
        <p class="text-sm text-slate-400 mt-2">Choose a report to view</p>
      </header>

      <section class="grid gap-6 sm:grid-cols-2">
        <a href="smoke/" class="group block rounded-xl border border-slate-800 bg-[#151820] p-6 transition hover:border-emerald-500/50 hover:bg-slate-800/40 focus:outline-none focus:ring-2 focus:ring-emerald-500/50">
          <div class="flex items-center gap-3">
            <span class="flex h-12 w-12 items-center justify-center rounded-lg bg-emerald-500/20 text-emerald-400 border border-emerald-500/50 group-hover:bg-emerald-500/30">
              <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            </span>
            <div>
              <h2 class="text-lg font-semibold text-slate-200 group-hover:text-white">Smoke tests</h2>
              <p class="text-xs text-slate-400">PR / push · quick sanity checks</p>
            </div>
          </div>
          <p class="mt-4 text-sm text-slate-400">Latest run from CI on push or pull request.</p>
        </a>

        <a href="regression/" class="group block rounded-xl border border-slate-800 bg-[#151820] p-6 transition hover:border-sky-500/50 hover:bg-slate-800/40 focus:outline-none focus:ring-2 focus:ring-sky-500/50">
          <div class="flex items-center gap-3">
            <span class="flex h-12 w-12 items-center justify-center rounded-lg bg-sky-500/20 text-sky-400 border border-sky-500/50 group-hover:bg-sky-500/30">
              <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
            </span>
            <div>
              <h2 class="text-lg font-semibold text-slate-200 group-hover:text-white">Regression tests</h2>
              <p class="text-xs text-slate-400">Scheduled · full suite</p>
            </div>
          </div>
          <p class="mt-4 text-sm text-slate-400">Latest run from the scheduled regression workflow.</p>
        </a>
      </section>
    </div>
  </body>
</html>
